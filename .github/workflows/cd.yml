name: CD

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  docker:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build jar
        run: ./mvnw clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    runs-on: self-hosted
    needs: docker
    if: ${{ github.ref == 'refs/heads/master' }}
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Deploy locally on self-hosted machine
        env:
          APP_PORT: ${{ secrets.APP_PORT }}
        run: |
          set -e
          DEPLOY_PATH="${HOME}/hayden-deploy"
          mkdir -p "${DEPLOY_PATH}"
          cp deploy/docker-compose.yml "${DEPLOY_PATH}/docker-compose.yml"
          cd "${DEPLOY_PATH}"
          echo "IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest" > .env
          echo "APP_PORT=${APP_PORT:-8080}" >> .env
          echo "${{ github.token }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -f
